name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Backup current release on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'sudo -n /usr/local/bin/andescode-backup.sh'

      - name: Rsync dist to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            dist/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/andescode/"

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: HTTP smoke checks
        run: |
          set -euo pipefail
          for path in / /auditorias /sitemap.xml; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "https://andescode.com.ar${path}")
            echo "GET ${path} -> ${code}"
            if [ "$code" != "200" ]; then
              echo "::error::smoke check failed for ${path} (got ${code})"
              exit 1
            fi
          done
